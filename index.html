<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Earn App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11191809' data-sdk='show_11191809'></script>
    
    <style>
        /* প্রফেশনাল ডিজাইন */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center; width: 80%; }
        .balance-box { font-size: 24px; margin-bottom: 20px; color: #00d4ff; }
        .btn { padding: 15px 25px; width: 100%; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-watch { background: #ff4757; color: white; }
        .btn-withdraw { background: #2ed573; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <div id="userGreeting">স্বাগতম!</div>
        <div class="balance-box">পয়েন্ট: <span id="points">0</span></div>
        <button class="btn btn-watch" onclick="handleAdClick()">বিজ্ঞাপন দেখুন (১০ পয়েন্ট)</button>
        <button class="btn btn-withdraw" onclick="alert('উইথড্র রিকোয়েস্ট সফল!')">উইথড্র</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার নাম দেখানো
        if (tg.initDataUnsafe.user) {
            document.getElementById('userGreeting').innerText = "হ্যালো, " + tg.initDataUnsafe.user.first_name;
        }

        let points = 0;
        function handleAdClick() {
            if (typeof show_11191809 === 'function') {
                show_11191809(); // বিজ্ঞাপন দেখাবে
                points += 10;    // পয়েন্ট বাড়াবে
                document.getElementById('points').innerText = points;
            } else {
                alert("বিজ্ঞাপন লোড হচ্ছে, কিছুক্ষণ অপেক্ষা করুন।");
            }
        }
    </script>
</body>
</html>
